services:
  db:
    image: postgres:16-alpine
    container_name: ecommerce-ms-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shopvns}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-shopvns}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ecommerce-ms-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: ecommerce-user-service
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_data &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    environment:
      DJANGO_ROOT_URLCONF: config.urls_auth_service
    env_file:
      - .env
    volumes:
      - ./services/user-service:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    container_name: ecommerce-product-service
    restart: unless-stopped
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2
    environment:
      DJANGO_ROOT_URLCONF: config.urls_inventory_service
    env_file:
      - .env
    volumes:
      - ./services/product-service:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_started

  cart-service:
    build:
      context: ./services/cart-service
      dockerfile: Dockerfile
    container_name: ecommerce-cart-service
    restart: unless-stopped
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2
    environment:
      DJANGO_ROOT_URLCONF: config.urls_cart_service
    env_file:
      - .env
    volumes:
      - ./services/cart-service:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_started

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: ecommerce-order-service
    restart: unless-stopped
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2
    environment:
      DJANGO_ROOT_URLCONF: config.urls_orders_service
      CART_SERVICE_URL: http://cart-service:8000
      INVENTORY_SERVICE_URL: http://product-service:8000
    env_file:
      - .env
    volumes:
      - ./services/order-service:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_started

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: ecommerce-notification-service
    restart: unless-stopped
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2
    environment:
      DJANGO_ROOT_URLCONF: config.urls_notifications_service
    env_file:
      - .env
    volumes:
      - ./services/notification-service:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_started

  notification-worker:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: ecommerce-notification-worker
    restart: unless-stopped
    command: celery -A config worker --loglevel=info --concurrency=2 -Q celery
    env_file:
      - .env
    volumes:
      - ./services/notification-service:/app
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_started

  notification-beat:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: ecommerce-notification-beat
    restart: unless-stopped
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    volumes:
      - ./services/notification-service:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_started

  flower:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: ecommerce-flower
    restart: unless-stopped
    command: celery -A config flower --port=5555 --basic-auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin123}
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - redis
      - notification-worker

  api-gateway:
    image: nginx:1.25-alpine
    container_name: ecommerce-api-gateway
    restart: unless-stopped
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - user-service
      - product-service
      - cart-service
      - order-service
      - notification-service

  frontend:
    image: nginx:1.25-alpine
    container_name: ecommerce-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:
